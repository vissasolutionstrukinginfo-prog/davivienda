services:
  - type: web
    name: davivienda
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node start-prod.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: davivienda-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
    healthCheckPath: /api/settings/mobile_app_enabled
    
  - type: pserv
    name: davivienda-db
    plan: free
    ipAllowList: []
    postgresMajorVersion: 15
